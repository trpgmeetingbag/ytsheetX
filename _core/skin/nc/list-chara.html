    <article>
      <h1>
        キャラクター一覧
        <small>
        <TMPL_IF name>：名前「<TMPL_VAR name>」を含む</TMPL_IF>
        <TMPL_IF player>：ＰＬ名「<TMPL_VAR player>」を含む</TMPL_IF>
        <TMPL_IF tag>：タグ「<TMPL_VAR tag>」</TMPL_IF>
        <TMPL_IF exp>：消費寵愛点「<TMPL_VAR exp>」</TMPL_IF>
        <TMPL_IF breedText>：ブリード「<TMPL_VAR breedText>」</TMPL_IF>
        <TMPL_IF syndrome>：ポジション＋クラス「<TMPL_VAR syndrome>」</TMPL_IF>
        <TMPL_IF anji>：暗示「<TMPL_VAR anji>」</TMPL_IF>
        <TMPL_IF image>：画像あり</TMPL_IF>
        <TMPL_IF playerName>：<TMPL_VAR playerName>さん</TMPL_IF>
        </small>
      </h1>
      <form method="get" action="./" name="search" id="form-search">
        <h3 onclick="formSwitch()">検索フォーム▼</h3>
        <p id="form-search-area" style="display:none">
          グループ：<select name="group"><option value="all">すべて<TMPL_LOOP Groups><option value="<TMPL_VAR ID>" <TMPL_VAR SELECTED>><TMPL_VAR NAME></TMPL_LOOP></select><br>
          名前　：<input type="text" name="name" value="<TMPL_VAR name>"><br>
          ＰＬ名：<input type="text" name="player" value="<TMPL_VAR player>"><br>
          タグ　：<input type="text" name="tag" value="<TMPL_VAR tag>"><br>
          消費寵愛点：<input type="number" name="exp-min" value="<TMPL_VAR expMin>" style="width:6em;"> ～ <input type="number" name="exp-max" value="<TMPL_VAR expMax>" style="width:6em;"><br>
          ポジション＋クラス：<input type="text" name="syndrome" value="<TMPL_VAR syndrome>"><br>
          暗示：<input type="text" name="anji" value="<TMPL_VAR anji>"><br>
          画像　：<input type="checkbox" name="image" value="1" >あり<br>
          <TMPL_IF LOGIN_ID>マイリスト内検索：<input type="checkbox" name="mode" value="mylist" <TMPL_IF modeMylist>checked</TMPL_IF>></TMPL_IF><br>
          <input type="submit" value="検索">
        </p>
      </form>
      <script src="<TMPL_VAR coreDir>/skin/_common/js/list.js" defer></script>
      <TMPL_LOOP Lists>
      <section class="list" id="group-<TMPL_VAR ID>">
        <h2><TMPL_VAR NAME> <small><TMPL_VAR TEXT> (<TMPL_VAR NUM-PC>)</small></h2>
        <TMPL_VAR NAV>
        <TMPL_IF simpleList>
        <ul>
          <TMPL_LOOP Characters><li<TMPL_IF HIDE> class="hide"</TMPL_IF>>
            <a href="./?id=<TMPL_VAR ID>" data-lv="<TMPL_VAR LV>"><TMPL_VAR NAME><small><TMPL_VAR PLAYER></small></a>
          </TMPL_LOOP>
        </ul>
        <TMPL_ELSE>
        <table>


          <thead>
            <tr>
              <th class="name"><a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=name">キャラクター名</a>
              <th class="player"><a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=player">ＰＬ</a>
              <th class="age">
                <a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=age">享年</a>
                <a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=gender">暗示</a>
              </th>
              <th class="works"><span>ポジション</span></th>
              <th class="syndrome"><span>クラス</span></th>
              <th class="exp"><a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=exp">消費<br>寵愛点</a>
              <th class="date"><a href="./?group=<TMPL_VAR ID><TMPL_VAR qLinks>&sort=date">更新<br>日時</a>
            </tr>
          </thead>
          <tbody>
          <TMPL_LOOP Characters><tr<TMPL_IF HIDE> class="hide"</TMPL_IF>>
            <td class="name"><a href="./?id=<TMPL_VAR ID>"><TMPL_VAR NAME></a>
            <td class="player"><TMPL_VAR PLAYER>
            <td class="age">
              <span><TMPL_VAR AGE></span>
              <span class="anji"><TMPL_VAR ANJI></span>
            </td>
            <td class="works"><TMPL_VAR WORKS>
            <td class="syndrome"><TMPL_VAR SYNDROME>
            <td class="exp"><TMPL_VAR EXP>
            <td class="tags"><TMPL_VAR TAGS>
            <td class="date"><div><TMPL_VAR DATE></div>
          </tr></TMPL_LOOP>
          </tbody>




           
        </table>
        </TMPL_IF>
        <TMPL_VAR NAV>
        <TMPL_IF modeIndex><p class="more"><a href="./?group=<TMPL_VAR ID>">>>MORE</a></p></TMPL_IF>
      </section>
      </TMPL_LOOP>
      <TMPL_IF simpleIndex><section class="list">
        <ul class="grouplist">
        <TMPL_LOOP Groups><li><a href="./?group=<TMPL_VAR ID>"><TMPL_VAR NAME><small><TMPL_VAR TEXT></small></a></TMPL_LOOP>
        </ul>
      </section></TMPL_IF>
    </article>
    <div id="page-top-button"><a href="#"></a></div>
